<body>
    <script>
        const valor = Number(prompt('qual o valor do jantar?'))
        const garcom = valor * .1
        const total = valor + garcom
        //alert(`como o valor da sua conta é de R$ ${valor.toFixed(2)} a taxa do garçom é de R$ ${garcom.toFixed(2)} e o valor total a pagar é de R$ ${total.toFixed(2)}`)
        alert(`valor da conta: R$ ${valor.toFixed(2)}\nValor do garçom: R$ ${garcom.toFixed(2)}\nValor total: R$ ${total.toFixed(2)}`)
    </script>
</body>
