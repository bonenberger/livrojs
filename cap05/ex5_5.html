<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 5.5</title>
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <img class="alta" src="img/ex5_5.jpg" alt="contas a pagar">
    <h1>programa contas do mês</h1>
    <form action="#">
        <p>
            Descrição da conta: 
            <input type="text" name="conta" id="inconta" required>
        </p>
        <p>
            Valor a Pagar R$: 
            <input type="number" name="valor" id="invalor" min="0" step="0.01" required>
        </p>
        <p>
            <input type="submit" value="Registrar Conta">
        </p>
    </form>
    <pre id="outresp1"></pre>
    <pre id="outresp2"></pre>
    <script src="js/ex5_5.js"></script>
</body>
</html>
