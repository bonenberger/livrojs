<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const preco = Number(prompt('preço do produto:'))
        const pix = preco * .9
        const prazo = preco / 3
        alert(`preço: R$ ${preco.toFixed(2)}\nÀ vista: R$ ${pix.toFixed(2)}\nOu em 3x de: R$ ${prazo.toFixed(2)}`)
    </script>
</body>
</html>
