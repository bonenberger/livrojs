<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 2.4</title>
</head>
<body>
    <h1>Restaurante JS</h1>
    <form action="formulario">
        <p>
            buffet por kg R$: 
            <input type="number" name="preco" id="inPreco" min="0" step=".01" required>
        </p>
        <p>
            consumo do cliente (g):
            <input type="number" name="consumo" id="inConsumo" min="0" required>
        </p>
        <input type="submit" value="Calcular Preço">
    </form>
    <h2></h2>
    <script src="js/ex2_4.js"></script>
</body>
</html>
