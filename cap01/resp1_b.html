<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        const conta = Number(prompt('qual o valor da conta?'))
        const pagantes = Number(prompt('dividir a conta em quantos pagantes?'))
        const fracao = conta / pagantes
        alert(`o valor por cliente é R$ ${fracao.toFixed(2)}`)
    </script>
</body>
</html>
