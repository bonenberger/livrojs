<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemplo 5.4</title>
</head>
<body>
    <script>
        alert('digite 0 para sair')
        do {
            const num = Number(prompt('número: '))
            if (num == 0 || isNaN(num)) {
                const sair = confirm('confirma saída?')
                if (sair) {
                    break
                }else {
                    continue
                }
            }
            if (num % 2 == 0) {
                alert(`o dobro de ${num} é: ${num*2}`)
            }else {
                alert(`o tripo de ${num} é ${num*3}`)
            }
        }while(true)
        alert('bye, bye!')
    </script>
</body>
</html>
