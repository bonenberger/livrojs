<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 4.2</title>
    <link rel="shortcut icon" href="img/livrojs.png" type="image/x-icon">
    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
    <img src="img/ex4_2.jpg" alt="foto de uma balança">
    <h1>Programa Cálculo do Peso Ideal</h1>
    <form action="formulario.php">
        <p>
            Nome:
            <input type="text" name="nome" id="innome" required>
        </p>
        <p>
            Sexo: 
            <input type="radio" name="sexo" id="inmas" checked>Masculino
            <input type="radio" name="sexo" id="infem">Feminino
        </p>
        <p>
            Altura (m):
            <input type="number" name="altura" id="inalt" min="1" max="3" step="0.01" required>
        </p>
        <p>
            <input type="submit" value="Calcular Peso Ideal">
            <input type="reset" value="Limpar Campos">
        </p>
    </form>
    <h2></h2>
    <script src="js/ex4_2.js"></script>
</body>
</html>
